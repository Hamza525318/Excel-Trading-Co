<body class="overflow-x-hidden">

  <div id="navbar-placeholder"></div>
  <script>
    fetch('/navbar.html')
      .then(r => r.text())
      .then(function(html) {
        document.getElementById('navbar-placeholder').innerHTML = html;
        var s1 = document.createElement('script');
        s1.src = '/assets/scripts/index.js';
        document.body.appendChild(s1);
        var s2 = document.createElement('script');
        s2.src = '/assets/scripts/products.js';
        document.body.appendChild(s2);
      });
  </script>

    <section class="contact-section h-40 md:64 flex justify-center items-center">
      <div class="overlay"></div>
      <div class="content text-white ml-6">
          <!-- Text Box -->
          <div class="text-box text-center text-white font-roboto">
            <h3 class="text-lg md:text-xl font-bold " id="product-title">Reach Out Today — We're Here to Help</h3>
          </div>
         </div>
     </section>

    <section class="py-16 bg-gray-50 px-6 md:px-16">
        <div class="container mx-auto flex flex-col md:flex-row">
          <!-- Left Section (Form) -->
          <div class="md:w-1/2 bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-[#00396F] text-2xl font-bold font-outfit mb-2">Get in touch With Us</h2>
            <div class="h-1 w-16 bg-[#F9BD86] mb-4"></div>
            <p class="text-lg font-poppins mb-6">We Would Love To Hear From You</p>
            <form
              action="https://formspree.io/f/xykrjjnj"
              method="POST">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 font-poppins">
                <input required type="text" name="name" placeholder="First Name" class="p-3 border border-gray-300 rounded-md focus:outline-none focus:border-[#00396F]">
                <input required type="email" name="email" placeholder="Email" class="p-3 border border-gray-300 rounded-md focus:outline-none focus:border-[#00396F]">
              </div>
              <div class="mb-4">
                <input required type="text" name="phone" placeholder="Contact Number" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-[#00396F]">
              </div>
              <div class="mb-6">
                <textarea required placeholder="Your Message" name="message" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-[#00396F]" rows="5"></textarea>
              </div>
                <input type="hidden" name="_subject" value="New Contact Form Submission from Excel Trading Website">
                <input type="hidden" name="_next" value="https://exceltrading.in/success.html">
              <input type="text" name="_gotcha" style="display:none">
              <button type="submit" class="bg-[#FF8C42] text-white py-2 px-8 rounded-full font-roboto text-lg hover:bg-orange-600 transition duration-300 ease-in-out">
                Submit Message
              </button>
            </form>
          </div>
          <!-- Right Section (Empty for now) -->
           <!-- Right Section -->
           <div class="md:w-1/2 mt-8 md:mt-0 md:pl-12">
            <div class="space-y-6 font-poppins text-white">
              <!-- Consistently styled cards -->
              <div class="contact-card bg-dark-blue-500 float-left wow animate__animated animate__fadeInRight">
                <img src="../assets/icons/clock_orange.png" alt="Time Icon" class="icon">
                <p>Office Timings: 10:00 AM To 6:00 PM</p>
              </div>
              <div class="contact-card bg-dark-blue-500 float-right wow animate__animated animate__fadeInLeft">
                <img src="../assets/icons/location_orange.png" alt="Location Icon" class="icon">
                <p>163/1, Sadar Patrappa Rd, Bengaluru - 560002</p>
              </div>
              <div class="contact-card bg-dark-blue-500 float-left wow animate__animated animate__fadeInRight">
                <img src="../assets/icons/phone_orange.png" alt="Phone Icon" class="icon">
                <p>+91 7204435253</p>
              </div>
              <div class="contact-card bg-dark-blue-500 float-right wow animate__animated animate__fadeInLeft">
                <img src="../assets/icons/email_orange.png" alt="Email Icon" class="icon">
                <a href="mailto:info@exceltrading.in">info@exceltrading.in</a>
              </div>
            </div>
          </div>          
          </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script>
      fetch('/footer.html')

        .then(html => document.getElementById('footer-placeholder').innerHTML = html);
