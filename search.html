<body class="overflow-x-hidden">

<div id="navbar-placeholder"></div>
<script>
  fetch('/navbar.html')
    .then(r => r.text())
    .then(function(html) {
      document.getElementById('navbar-placeholder').innerHTML = html;
      var s1 = document.createElement('script');
      s1.src = '/assets/scripts/index.js';
      document.body.appendChild(s1);
      var s2 = document.createElement('script');
      s2.src = '/assets/scripts/products.js';
      document.body.appendChild(s2);
    });
</script>

<section class="py-12 px-6 md:px-16 bg-primary-gray-100 min-h-[50vh]">
  <div class="container mx-auto">
    <h1 class="text-2xl md:text-3xl font-outfit font-bold mb-2 text-[#00396F]">Search Results</h1>
    <div class="h-1 w-[8%] bg-orange-500 mb-8"></div>
    <div id="search-results-summary" class="text-gray-600 font-roboto mb-6"></div>
    <div id="search-results-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script>
  fetch('/footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html);
</script>

<script>
  function runSearch() {
    var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    var searchParams = new URLSearchParams(window.location.search);
    var q = (hashParams.get('q') || searchParams.get('q') || '').trim();
    var summary = document.getElementById('search-results-summary');
    var list = document.getElementById('search-results-list');

    if (!q) {
      summary.textContent = 'Type a keyword, product name, or DIN/ISO standard into the search box above.';
      return;
    }

    fetch('/assets/scripts/search-index.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var results = window.ExcelSearch ? window.ExcelSearch.search(data, q, 30) : [];
        summary.textContent = results.length
          ? results.length + ' result(s) for "' + q + '"'
          : 'No results for "' + q + '". Try a different keyword, or browse our product categories below.';

        results.forEach(function (r) {
          var a = document.createElement('a');
          a.href = r.url;
          a.className = 'block bg-white rounded-lg shadow-md p-5 hover:shadow-xl transition duration-300';
          var h3 = document.createElement('h3');
          h3.className = 'text-base md:text-lg font-semibold font-outfit text-[#00396F] mb-1';
          h3.textContent = r.title;
          a.appendChild(h3);
          list.appendChild(a);
        });

        if (!results.length) {
          var browse = document.createElement('a');
          browse.href = '/#products-range-section';
          browse.className = 'block bg-white rounded-lg shadow-md p-5 hover:shadow-xl transition duration-300 sm:col-span-2 lg:col-span-3 text-center text-[#00396F] font-semibold';
          browse.textContent = 'Browse All Products';
          list.appendChild(browse);
        }
      });
  }

  window.addEventListener('load', function () {
    var check = setInterval(function () {
      if (window.ExcelSearch) {
        clearInterval(check);
        runSearch();
      }
    }, 50);
  });
  window.addEventListener('hashchange', runSearch);
</script>

</body>
</html>
